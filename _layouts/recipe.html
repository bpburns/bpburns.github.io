---
layout: default
---

<article class="recipe">
  <h1>{{ page.title }}</h1>

  <div class="entry">
    {{ page.preptime }}
    {{ recipe.cooktime }}
    {{ content }}
  </div>

  <h2>Ingredients</h2>
  {{ page.ingredients }}

  <h2>Instructions</h2>
  {{ page.instructions }}

  <div class="date">
    Written on {{ page.date | date: "%B %e, %Y" }}
  </div>

  {% include disqus.html %}
</article>
