---
layout: default
---

<div class="recpies">
  {% for recipe in site.recipes %}
    <article class="recipe">

      <h1><a href="{{ site.baseurl }}{{ recipe.url }}">{{ recipe.title }}</a></h1>

      <div class="entry">
        {{ recipe.excerpt }}
      </div>
    </article>
  {% endfor %}
</div>
